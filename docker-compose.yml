version: '3.8'

services:
  mongodb:
    image: mongo:7
    container_name: finlead_mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: finlead_crm

  backend:
    build: ./backend
    container_name: finlead_backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      PORT: 5000
      MONGO_URI: mongodb://mongodb:27017/finlead_crm
      JWT_SECRET: finlead_super_secret_key_2024
      JWT_EXPIRES_IN: 7d
      NODE_ENV: production
      FRONTEND_URL: http://localhost:5173
    depends_on:
      - mongodb

  frontend:
    build: ./frontend
    container_name: finlead_frontend
    restart: unless-stopped
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  mongo_data:
